<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1 April Grap</title>
<style>
    #aprilFoolsMessage {
        display: none;
        background: #ffcccc;
        padding: 20px;
        border: 2px solid red;
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>Vul hieronder je gegevens in</h1>

<form id="fakeForm">
    <label>Naam:</label><br>
    <input type="text" id="naam"><br><br>

    <label>Email:</label><br>
    <input type="email" id="email"><br><br>

    <button type="button" id="verzendKnop">Verzenden</button>
</form>

<div id="aprilFoolsMessage">🎉 1 APRIL! Je bent erin getrapt! 🎉</div>

<script>
    let messageShown = false;

    function showAprilFools() {
        if (!messageShown) {
            document.getElementById("aprilFoolsMessage").style.display = "block";
            messageShown = true;
        }
    }

    // 1️⃣ Na 5 seconden automatisch
    setTimeout(showAprilFools, 5000);

    // 2️⃣ Bij elke klik in het formulier of op knoppen
    document.getElementById("fakeForm").addEventListener("click", showAprilFools);
    document.getElementById("verzendKnop").addEventListener("click", showAprilFools);
</script>

</body>
</html>
